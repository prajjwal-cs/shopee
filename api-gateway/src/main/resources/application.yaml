server:
  port: 8080
spring:
  application:
    name: api-gateway
  security:
    oauth2:
      resourceserver:
        jwt:
          secret-key: ${JWT_SECRET:your-256-bit-secret-key-here-minimum-32-chars}
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: lb://user-service
          predicates: [Path=/api/users/**]
          filters: [JwtAuthFilter]
        - id: product-service
          uri: lb://product-service
          predicates: [Path=/api/products/**]
        - id: cart-service
          uri: lb://cart-service
          predicates: [Path=/api/cart/**]
          filters: [JwtAuthFilter]
        - id: order-service
          uri: lb://order-service
          predicates: [Path=/api/orders/**]
          filters: [JwtAuthFilter]
        - id: payment-service
          uri: lb://payment-service
          predicates: [Path=/api/payments/**]
          filters: [JwtAuthFilter]

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8671/eureka/