server:
  port: 8081

spring:
  application:
    name: user-service

  datasource:
    url: jdbc:postgresql://localhost:5432/shopee
    username: postgres
    password: 123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

    mail:
      host: smtp.gmail.com
      port: 587
      username: ${MAIL_USERNAME}
      password: ${MAIL_PASSWORD}       # use an App Password, not your real Gmail password
      properties:
        mail:
          smtp:
            auth: true
            starttls:
              enable: true

jwt:
  secret: ${JWT_SECRET:your-secret-key-must-be-at-least-32-chars-long}
  expiration: 86400000

app:
  frontend-url: ${FRONTEND_URL:http://localhost:3000}
  refresh-token:
    expiration: 604800000
  password-reset:
    expiration: 900000